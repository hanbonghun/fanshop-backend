spring:
  application.name: order-service
  profiles.active: local
  config:
    import:
      - monitoring.yml
      - logging.yml
  cloud:
    function:
      definition: inventoryReservedConsumer;inventoryRejectedConsumer;paymentCompletedConsumer;paymentFailedConsumer
    stream:
      default:
        contentType: application/json
      bindings:
        orderCreated-out-0:
          destination: order.created
        inventoryReservedConsumer-in-0:
          destination: inventory.reserved
          group: order-service
        inventoryRejectedConsumer-in-0:
          destination: inventory.rejected
          group: order-service
        paymentCompletedConsumer-in-0:
          destination: payment.completed
          group: order-service
        paymentFailedConsumer-in-0:
          destination: payment.failed
          group: order-service
      kafka:
        binder:
          brokers: localhost:9092

jwt:
  secret: fanshop-member-service-jwt-secret-key-must-be-at-least-256bits
  expiration-ms: 86400000

product-service:
  url: http://localhost:8081

server:
  port: 8083

---
spring.config.activate.on-profile: local

spring:
  datasource:
    url: jdbc:h2:mem:orderdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

---
spring.config.activate.on-profile: local-dev

server:
  port: 8083

spring:
  threads:
    virtual:
      enabled: true
  config:
    import:
      - monitoring-otel.yml
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?serverTimezone=UTC&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: fanshop
    password: fanshop
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
