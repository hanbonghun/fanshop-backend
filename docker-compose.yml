services:
  mysql:
    image: mysql:8.0
    container_name: fanshop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: fanshop
      MYSQL_PASSWORD: fanshop
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fanshop-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fanshop-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  otelcol:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: fanshop-otelcol
    ports:
      - "4317:4317"   # gRPC OTLP (앱 → OTel Collector)
      - "4318:4318"   # HTTP OTLP (앱 → OTel Collector)
      - "8889:8889"   # Prometheus exporter (Prometheus → OTel Collector)
    volumes:
      - ./docker/otelcol/otelcol-config.yml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.0
    container_name: fanshop-tempo
    ports:
      - "3200:3200"   # HTTP API (Grafana → Tempo 쿼리)
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yml
      - tempo-data:/var/tempo
    command: [ "-config.file=/etc/tempo.yml" ]

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: fanshop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - otelcol

  grafana:
    image: grafana/grafana:11.6.1
    container_name: fanshop-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki

  loki:
    image: grafana/loki:3.3.2
    container_name: fanshop-loki
    user: "0:0"
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/tmp/loki
    command: [ "-config.file=/etc/loki/local-config.yaml" ]

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
  tempo-data:
  loki-data:
